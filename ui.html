<!doctype html>
<html>
<head>
  <script>
    try {
      window.localStorage.getItem('x')
    } catch (e) {
      const store = new Map()
      const shim = {
        getItem: (k) => (store.has(k) ? store.get(k) : null),
        setItem: (k, v) => { store.set(k, String(v)) },
        removeItem: (k) => { store.delete(k) },
        clear: () => { store.clear() },
        key: (i) => Array.from(store.keys())[i] ?? null,
        get length() { return store.size },
      }
      Object.defineProperty(window, 'localStorage', { value: shim, configurable: true })
    }
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
    body { display: flex; flex-direction: column; }
    #plugin-root { display: flex; flex-direction: column; width: 100%; height: 100%; overflow: hidden; }
    .main-area { display: flex; flex-direction: row; flex: 1; overflow: hidden; min-height: 0; }
    .col-preview { flex: 1; min-width: 160px; display: flex; flex-direction: column; padding: 24px; border-right: 1px solid var(--figma-color-border, #e5e5e5); background: var(--figma-color-bg, #fff); gap: 10px; }
    .preview-header { display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .preview-label { font-family: var(--font-family, Inter, sans-serif); font-size: 10px; font-weight: 600; color: var(--figma-color-text-secondary, #737373); text-transform: uppercase; letter-spacing: 0.04em; }
    .mode-toggle { display: flex; align-items: center; justify-content: center; width: 22px; height: 22px; border: 1px solid var(--figma-color-border, #e5e5e5); border-radius: 4px; background: transparent; cursor: pointer; padding: 0; color: var(--figma-color-text-secondary, #737373); transition: background 0.15s, color 0.15s; }
    .mode-toggle:hover { background: var(--figma-color-bg-hover, #f0f0f0); }
    #preview-canvas { display: block; border-radius: 8px; flex: 1; width: 100%; min-height: 0; border: 1px solid var(--figma-color-border, #e5e5e5); }
    .col-controls { width: 320px; flex-shrink: 0; overflow-y: auto; overflow-x: hidden; min-height: 0; padding: 24px; }
    .col-controls fig-group { display: block; margin-bottom: 0; }
    dialog.fig-fill-picker-dialog { width: 280px; max-width: 280px; min-width: 280px; max-height: none; height: max-content; }
    .data-status { font-family: var(--font-family); font-size: var(--body-medium-fontSize, 11px); color: var(--figma-color-text-secondary); margin-top: 4px; display: none; }
    .data-status.visible { display: block; }
    .pie-hint { font-family: var(--font-family); font-size: var(--body-medium-fontSize, 11px); color: var(--figma-color-text-secondary); margin-top: 4px; }
    fig-footer { flex-shrink: 0; background-color: var(--figma-color-bg); box-shadow: inset 0 1px 0 0 var(--figma-color-border); }
    .resize-handle { position: fixed; bottom: 0; right: 0; width: 14px; height: 14px; cursor: nwse-resize; z-index: 500; opacity: 0.35; transition: opacity 0.15s; display: flex; align-items: flex-end; justify-content: flex-end; }
    .resize-handle:hover { opacity: 0.75; }
    .resize-handle.dragging { opacity: 0.9; }
  </style>
</head>
<body>
  <div id="plugin-root">
    <div class="main-area">
      <div class="col-preview">
        <div class="preview-header">
          <span class="preview-label">Preview</span>
          <button class="mode-toggle" id="modeToggle" title="Toggle dark/light">
            <svg id="iconLight" width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="3" stroke="currentColor" stroke-width="1.25"/><line x1="7" y1="1" x2="7" y2="2.5" stroke="currentColor" stroke-width="1.25" stroke-linecap="round"/><line x1="7" y1="11.5" x2="7" y2="13" stroke="currentColor" stroke-width="1.25" stroke-linecap="round"/><line x1="1" y1="7" x2="2.5" y2="7" stroke="currentColor" stroke-width="1.25" stroke-linecap="round"/><line x1="11.5" y1="7" x2="13" y2="7" stroke="currentColor" stroke-width="1.25" stroke-linecap="round"/><line x1="2.93" y1="2.93" x2="4.06" y2="4.06" stroke="currentColor" stroke-width="1.25" stroke-linecap="round"/><line x1="9.94" y1="9.94" x2="11.07" y2="11.07" stroke="currentColor" stroke-width="1.25" stroke-linecap="round"/><line x1="11.07" y1="2.93" x2="9.94" y2="4.06" stroke="currentColor" stroke-width="1.25" stroke-linecap="round"/><line x1="4.06" y1="9.94" x2="2.93" y2="11.07" stroke="currentColor" stroke-width="1.25" stroke-linecap="round"/></svg>
            <svg id="iconDark" width="14" height="14" viewBox="0 0 14 14" fill="none" style="display:none"><path d="M11.5 8.5A5 5 0 0 1 5.5 2.5a5 5 0 1 0 6 6z" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>
        <canvas id="preview-canvas"></canvas>
      </div>
      <div class="col-controls">
        <fig-group name="Chart type"><fig-field><label>Type</label><fig-options id="chartType" value="bar" options="area, bar, pie"></fig-options></fig-field></fig-group>
        <fig-group name="Data source"><fig-field><label>CSV file</label><fig-input-file id="csvFile" label="Upload CSV" full variant="secondary" accepts=".csv,.txt"></fig-input-file></fig-field><div class="data-status" id="csvStatus"></div><div class="pie-hint" id="pieHint" style="display:none">Pie: each series becomes one slice</div></fig-group>
        <fig-group name="Layout"><fig-field><label>Show legend</label><fig-switch id="showLegend" checked></fig-switch></fig-field><fig-field id="field-showGrid"><label>Show grid lines</label><fig-switch id="showGrid" checked></fig-switch></fig-field><fig-field id="field-stackedMode"><label>Stacked</label><fig-switch id="stackedMode"></fig-switch></fig-field></fig-group>
        <fig-group name="Titles">
          <fig-field><label>Chart title</label><fig-switch id="showChartTitle" checked></fig-switch></fig-field>
          <fig-field id="field-chartTitle"><label>Title text</label><fig-input-text id="chartTitle" value="Chart title"></fig-input-text></fig-field>
          <fig-field id="field-showXAxisTitle"><label>X axis title</label><fig-switch id="showXAxisTitle"></fig-switch></fig-field>
          <fig-field id="field-xAxisTitle" style="display:none"><label>X axis label</label><fig-input-text id="xAxisTitle" value="X axis"></fig-input-text></fig-field>
          <fig-field id="field-showYAxisTitle"><label>Y axis title</label><fig-switch id="showYAxisTitle"></fig-switch></fig-field>
          <fig-field id="field-yAxisTitle" style="display:none"><label>Y axis label</label><fig-input-text id="yAxisTitle" value="Y axis"></fig-input-text></fig-field>
        </fig-group>
      </div>
    </div>
    <fig-footer><fig-button id="action-generate" type="submit">Generate chart</fig-button></fig-footer>
    <div class="resize-handle" id="resize-handle"><svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M9 3L3 9M9 6.5L6.5 9" stroke="#737373" stroke-width="1.25" stroke-linecap="round"/></svg></div>
  </div>
  <script>
    var parsedCsvData=null,parsedCsvNames=null,parsedCategoryNames=null,isDarkMode=false
    function updateChartTypeUI(){var t=document.getElementById('chartType').value||'bar',p=t==='pie';document.getElementById('field-showGrid').style.display=p?'none':'';document.getElementById('field-stackedMode').style.display=p?'none':'';document.getElementById('pieHint').style.display=p?'block':'none';document.getElementById('field-showXAxisTitle').style.display=p?'none':'';document.getElementById('field-showYAxisTitle').style.display=p?'none':'';updateTitleVisibility()}
    function updateTitleVisibility(){var t=document.getElementById('chartType').value||'bar',p=t==='pie';document.getElementById('field-chartTitle').style.display=document.getElementById('showChartTitle').checked?'':'none';document.getElementById('field-xAxisTitle').style.display=(!p&&document.getElementById('showXAxisTitle').checked)?'':'none';document.getElementById('field-yAxisTitle').style.display=(!p&&document.getElementById('showYAxisTitle').checked)?'':'none'}
    document.getElementById('chartType').addEventListener('change',function(){updateChartTypeUI();schedulePreview()})
    document.getElementById('showChartTitle').addEventListener('change',function(){updateTitleVisibility();schedulePreview()})
    document.getElementById('showXAxisTitle').addEventListener('change',function(){updateTitleVisibility();schedulePreview()})
    document.getElementById('showYAxisTitle').addEventListener('change',function(){updateTitleVisibility();schedulePreview()})
    document.getElementById('showLegend').addEventListener('change',schedulePreview)
    document.getElementById('showGrid').addEventListener('change',schedulePreview)
    document.getElementById('stackedMode').addEventListener('change',schedulePreview)
    document.getElementById('chartTitle').addEventListener('input',schedulePreview)
    document.getElementById('xAxisTitle').addEventListener('input',schedulePreview)
    document.getElementById('yAxisTitle').addEventListener('input',schedulePreview)
    updateChartTypeUI()
    function parseCsv(text){var lines=text.split(/\r?\n/).map(function(l){return l.trim()}).filter(function(l){return l.length>0});if(!lines.length)return null;var rows=lines.map(function(line){return line.split(',').map(function(c){return c.trim()})});var hasHeader=rows[0].some(function(c){return isNaN(Number(c))||c===''});var headers=null,dataRows=rows;if(hasHeader){headers=rows[0];dataRows=rows.slice(1)}if(!dataRows.length)return null;var firstLabel=isNaN(Number(dataRows[0][0]))||dataRows[0][0]==='';var off=firstLabel?1:0;var nCols=Math.max.apply(null,dataRows.map(function(r){return r.length}))-off;if(nCols<=0)return null;var series=[];for(var c=0;c<nCols;c++){var col=[];for(var r=0;r<dataRows.length;r++){var v=parseFloat(dataRows[r][c+off]);col.push(isFinite(v)?v:0)}series.push(col)}var names=null;if(headers){names=[];for(var c2=off;c2<headers.length;c2++)names.push(headers[c2]||('Series '+String.fromCharCode(65+c2-off)))}var cats=firstLabel?dataRows.map(function(r){return r[0]||''}):null;return{series:series,names:names,categoryNames:cats}}
    function updateCsvStatus(text){var el=document.getElementById('csvStatus');if(text){el.textContent=text;el.classList.add('visible')}else{el.textContent='';el.classList.remove('visible')}}
    document.getElementById('csvFile').addEventListener('change',function(e){var files=e.detail&&e.detail.files;if(!files||!files.length){parsedCsvData=null;parsedCsvNames=null;updateCsvStatus('');schedulePreview();return}files[0].text().then(function(text){var result=parseCsv(text);if(!result||!result.series.length){parsedCsvData=null;parsedCsvNames=null;updateCsvStatus('Could not parse CSV');schedulePreview();return}parsedCsvData=result.series;parsedCsvNames=result.names;parsedCategoryNames=result.categoryNames||null;updateCsvStatus(Math.min(result.series.length,6)+' series, '+(result.series[0]?result.series[0].length:0)+' points loaded');schedulePreview()})})
    function hasParam(v,n){return Object.prototype.hasOwnProperty.call(v,n)}
    function setVal(id,v){var el=document.getElementById(id);if(!el)return;var s=String(v);el.value=s;el.setAttribute('value',s)}
    function setChecked(id,v){var el=document.getElementById(id);if(!el)return;el.checked=Boolean(v);if(el.checked)el.setAttribute('checked','');else el.removeAttribute('checked')}
    function setPanelParams(values){if(typeof values!=='object'||values===null)return;if(hasParam(values,'chartType')){setVal('chartType',values.chartType);updateChartTypeUI()}if(hasParam(values,'showLegend'))setChecked('showLegend',values.showLegend);if(hasParam(values,'showGrid'))setChecked('showGrid',values.showGrid);if(hasParam(values,'stackedMode'))setChecked('stackedMode',values.stackedMode);if(hasParam(values,'showChartTitle')){setChecked('showChartTitle',values.showChartTitle);updateTitleVisibility()}if(hasParam(values,'chartTitle'))setVal('chartTitle',values.chartTitle);if(hasParam(values,'showXAxisTitle')){setChecked('showXAxisTitle',values.showXAxisTitle);updateTitleVisibility()}if(hasParam(values,'xAxisTitle'))setVal('xAxisTitle',values.xAxisTitle);if(hasParam(values,'showYAxisTitle')){setChecked('showYAxisTitle',values.showYAxisTitle);updateTitleVisibility()}if(hasParam(values,'yAxisTitle'))setVal('yAxisTitle',values.yAxisTitle);schedulePreview()}
    function currentParams(){return{chartType:String(document.getElementById('chartType').value||'bar'),showLegend:Boolean(document.getElementById('showLegend').checked),showGrid:Boolean(document.getElementById('showGrid').checked),stackedMode:Boolean(document.getElementById('stackedMode').checked),showChartTitle:Boolean(document.getElementById('showChartTitle').checked),chartTitle:String(document.getElementById('chartTitle').value||''),showXAxisTitle:Boolean(document.getElementById('showXAxisTitle').checked),xAxisTitle:String(document.getElementById('xAxisTitle').value||''),showYAxisTitle:Boolean(document.getElementById('showYAxisTitle').checked),yAxisTitle:String(document.getElementById('yAxisTitle').value||'')}}
    function resolveCustomData(){if(parsedCsvData&&parsedCsvData.length>0)return{customData:parsedCsvData,seriesNames:parsedCsvNames,categoryNames:parsedCategoryNames};return{customData:null,seriesNames:null,categoryNames:null}}
    document.getElementById('action-generate').addEventListener('click',function(){var resolved=resolveCustomData();parent.postMessage({pluginMessage:{type:'action',id:'generate',params:currentParams(),customData:resolved.customData,seriesNames:resolved.seriesNames,categoryNames:resolved.categoryNames}},'*')})
    window.onmessage=function(event){var msg=event.data&&event.data.pluginMessage;if(!msg)return;if(msg.type==='params-change'){setPanelParams(msg.params);return}}
    window.addEventListener('message',function(event){var msg=event.data&&event.data.pluginMessage;if(!msg||msg.type!=='action-state'||!msg.actions)return;var a=msg.actions["generate"],btn=document.getElementById('action-generate');if(a&&btn){if(a.enabled===false)btn.setAttribute('disabled','');else btn.removeAttribute('disabled');if(typeof a.label==='string')btn.textContent=a.label}})
    document.getElementById('modeToggle').addEventListener('click',function(){isDarkMode=!isDarkMode;document.getElementById('iconLight').style.display=isDarkMode?'none':'';document.getElementById('iconDark').style.display=isDarkMode?'':'none';schedulePreview()})
    var CHART_COLORS=['#EA580C','#0D9488','#164E63','#FBBF24','#38BDF8','#A78BFA']
    var DEFAULT_SERIES_NAMES=['Services 1','B2B License','B2B Consumption','Product D','Product E','Product F']
    function seededRand(seed){var s=seed;return function(){s=(s*1664525+1013904223)&0xffffffff;return((s>>>0)/0xffffffff)}}
    function genDefaultSeries(nS,nP){var out=[];for(var i=0;i<nS;i++){var rng=seededRand(i*997+42),data=[],v=300+rng()*400;for(var j=0;j<nP;j++){v+=(rng()-0.45)*250;v=Math.max(50,Math.min(950,v));data.push(Math.round(v))}out.push(data)}return out}
    function niceMax(dm){if(!dm||dm<=0)return 100;var raw=dm/5,mag=Math.pow(10,Math.floor(Math.log10(raw))),steps=[1,2,2.5,5,10],st=mag*10;for(var k=0;k<steps.length;k++){if(mag*steps[k]>=raw){st=mag*steps[k];break}}return Math.ceil(dm/st)*st}
    function rrect(ctx,x,y,w,h,r){if(h<=0||w<=0)return;r=Math.min(r,Math.min(w,h)/2);ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath()}
    function getPreviewData(){var resolved=resolveCustomData(),series=resolved.customData,names=resolved.seriesNames,cats=resolved.categoryNames;if(!series||!series.length){series=genDefaultSeries(3,5);names=null;cats=null}series=series.slice(0,6);var nS=series.length,nP=series.reduce(function(m,s){return Math.max(m,s.length)},0);series=series.map(function(s){if(s.length<nP){var last=s[s.length-1]||0;return s.concat(Array(nP-s.length).fill(last))}return s.slice(0,nP)});var sN=[],cN=[];for(var i=0;i<nS;i++)sN.push(names&&names[i]?names[i]:DEFAULT_SERIES_NAMES[i]||('Series '+(i+1)));for(var i=0;i<nP;i++)cN.push(cats&&cats[i]?cats[i]:'Y'+(i+1));return{series:series,nS:nS,nP:nP,seriesNames:sN,categoryNames:cN}}
    function drawPreview(){var canvas=document.getElementById('preview-canvas');if(!canvas)return;var dpr=window.devicePixelRatio||1,W=Math.round(canvas.getBoundingClientRect().width)||200,H=Math.round(canvas.getBoundingClientRect().height)||300;canvas.width=W*dpr;canvas.height=H*dpr;var ctx=canvas.getContext('2d');ctx.scale(dpr,dpr);var chartType=document.getElementById('chartType').value||'bar',stacked=document.getElementById('stackedMode').checked,showGrid=document.getElementById('showGrid').checked,showLegend=document.getElementById('showLegend').checked,showChartTitle=document.getElementById('showChartTitle').checked,chartTitle=(document.getElementById('chartTitle').value||'Chart title').trim(),showXAxisTitle=document.getElementById('showXAxisTitle').checked,xAxisTitle=(document.getElementById('xAxisTitle').value||'X axis').trim(),showYAxisTitle=document.getElementById('showYAxisTitle').checked,yAxisTitle=(document.getElementById('yAxisTitle').value||'Y-Axis').trim();var d=getPreviewData(),FONT='-apple-system,BlinkMacSystemFont,Inter,sans-serif';var C_BG=isDarkMode?'#1C1C1E':'#F5F5F5',C_TITLE=isDarkMode?'#FAFAFA':'#0A0A0A',C_MUTED=isDarkMode?'#8A8A8E':'#737373',C_GRID=isDarkMode?'rgba(255,255,255,0.08)':'rgba(229,229,229,0.9)';ctx.fillStyle=C_BG;rrect(ctx,0,0,W,H,6);ctx.fill();var headerH=0,HPAD=12,VPAD=10;if((showChartTitle||showLegend)&&chartType!=='pie'){var titleH=0;if(showChartTitle){ctx.fillStyle=C_TITLE;ctx.font='bold 11px '+FONT;ctx.textAlign='left';ctx.textBaseline='top';var titleText=chartTitle,maxTW=W*0.5;while(titleText.length>3&&ctx.measureText(titleText).width>maxTW)titleText=titleText.slice(0,-1);if(titleText!==chartTitle)titleText=titleText.slice(0,-1)+'…';ctx.fillText(titleText,HPAD,VPAD);titleH=12}if(showLegend){ctx.font='8px '+FONT;ctx.textBaseline='middle';var lx=W-HPAD,legendItems=[],totalLW=0;for(var s=d.nS-1;s>=0;s--){var lbl=d.seriesNames[s],lw=7+3+ctx.measureText(lbl).width+6;totalLW+=lw;legendItems.unshift({s:s,lbl:lbl,lw:lw})}var ly=VPAD,maxLegendW=W-HPAD*2-(titleH>0?W*0.45:0);if(totalLW>maxLegendW){var row1=[],row2=[],rw=0;for(var k=0;k<legendItems.length;k++){if(rw+legendItems[k].lw<maxLegendW){row1.push(legendItems[k]);rw+=legendItems[k].lw}else row2.push(legendItems[k])}function drawLR(items,y){var rx=W-HPAD;for(var k=items.length-1;k>=0;k--){var it=items[k],col=CHART_COLORS[it.s]||'#999',tw=ctx.measureText(it.lbl).width;rx-=tw;ctx.fillStyle=C_TITLE;ctx.fillText(it.lbl,rx,y+4);rx-=3;rrect(ctx,rx-7,y,7,7,1.5);ctx.fillStyle=col;ctx.fill();rx-=13}}drawLR(row1,VPAD);if(row2.length)drawLR(row2,VPAD+10);headerH=VPAD+(row2.length?20:10)+6}else{lx=W-HPAD;for(var k=legendItems.length-1;k>=0;k--){var it=legendItems[k],col=CHART_COLORS[it.s]||'#999',tw=ctx.measureText(it.lbl).width;lx-=tw;ctx.fillStyle=C_TITLE;ctx.fillText(it.lbl,lx,ly+4);lx-=3;rrect(ctx,lx-7,ly,7,7,1.5);ctx.fillStyle=col;ctx.fill();lx-=13}headerH=VPAD+(titleH>0?titleH:8)+6}if(titleH>0&&headerH<VPAD+titleH+8)headerH=VPAD+titleH+8}else{headerH=VPAD+titleH+6}}var yTW=showYAxisTitle&&chartType!=='pie'?12:0,yLW=chartType!=='pie'?26:0,xLH=chartType!=='pie'?16:0,xTH=showXAxisTitle&&chartType!=='pie'?14:0;var plotL=HPAD+yTW+yLW,plotR=W-HPAD,plotT=headerH+4,plotB=H-VPAD-xLH-xTH,plotW=plotR-plotL,plotH=plotB-plotT;if(plotH<10||plotW<10)return;if(showYAxisTitle&&chartType!=='pie'){ctx.save();ctx.translate(HPAD+yTW/2,(plotT+plotB)/2);ctx.rotate(-Math.PI/2);ctx.fillStyle=C_MUTED;ctx.font='8px '+FONT;ctx.textAlign='center';ctx.textBaseline='middle';var ytxt=yAxisTitle;while(ytxt.length>2&&ctx.measureText(ytxt).width>plotH*0.8)ytxt=ytxt.slice(0,-1);if(ytxt!==yAxisTitle)ytxt=ytxt.slice(0,-1)+'…';ctx.fillText(ytxt,0,0);ctx.restore()}var gMax=0;if(chartType!=='pie'){for(var i=0;i<d.nP;i++){if(stacked){var sum=0;for(var s=0;s<d.nS;s++)sum+=d.series[s][i];gMax=Math.max(gMax,sum)}else{for(var s=0;s<d.nS;s++)gMax=Math.max(gMax,d.series[s][i])}}}var maxV=niceMax(gMax);if(chartType!=='pie'){ctx.fillStyle=C_MUTED;ctx.font='7px '+FONT;ctx.textAlign='right';ctx.textBaseline='middle';for(var g=0;g<=4;g+=2){var val=(g/4)*maxV,gy=plotT+plotH-(g/4)*plotH;ctx.fillText(val>=10000?(val/1000).toFixed(0)+'k':val>=1000?(val/1000).toFixed(1).replace(/\.0$/,'')+'k':val.toFixed(0),plotL-3,gy)}if(showGrid){ctx.strokeStyle=C_GRID;ctx.lineWidth=0.5;for(var g=0;g<=4;g++){var gy=plotT+plotH-(g/4)*plotH;ctx.beginPath();ctx.moveTo(plotL,gy);ctx.lineTo(plotR,gy);ctx.stroke()}}}if(chartType==='bar'){var colW=plotW/d.nP,gap=Math.max(1,colW*0.1);if(stacked){for(var i=0;i<d.nP;i++){var base=0,bx=plotL+i*colW+gap,bw=colW-gap*2;for(var s=d.nS-1;s>=0;s--){var bh=Math.max(0,(d.series[s][i]/maxV)*plotH);rrect(ctx,bx,plotT+plotH-base-bh,bw,bh,s===d.nS-1?2:0);ctx.fillStyle=CHART_COLORS[s]||'#999';ctx.fill();base+=bh}}}else{var sw=Math.max(1,(colW-gap*2)/d.nS);for(var i=0;i<d.nP;i++){for(var s=0;s<d.nS;s++){var bh=Math.max(0,(d.series[s][i]/maxV)*plotH),bx=plotL+i*colW+gap+s*sw;rrect(ctx,bx,plotT+plotH-bh,Math.max(1,sw-1),bh,2);ctx.fillStyle=CHART_COLORS[s]||'#999';ctx.fill()}}}}else if(chartType==='area'){var ss=[];if(stacked){var run=Array(d.nP).fill(0);for(var s=0;s<d.nS;s++){var row=[];for(var i=0;i<d.nP;i++){run[i]+=d.series[s][i];row.push(run[i])}ss.push(row)}}function tx(i){return plotL+(i/Math.max(1,d.nP-1))*plotW}function ty(v){return plotT+plotH-(v/maxV)*plotH}for(var s=d.nS-1;s>=0;s--){var top=stacked?ss[s]:d.series[s],bot=stacked&&s>0?ss[s-1]:null,col=CHART_COLORS[s]||'#999';ctx.beginPath();ctx.moveTo(tx(0),ty(top[0]));for(var i=1;i<d.nP;i++)ctx.lineTo(tx(i),ty(top[i]));if(bot){for(var i=d.nP-1;i>=0;i--)ctx.lineTo(tx(i),ty(bot[i]))}else{ctx.lineTo(tx(d.nP-1),plotT+plotH);ctx.lineTo(plotL,plotT+plotH)}ctx.closePath();ctx.fillStyle=col+'40';ctx.fill();ctx.beginPath();ctx.moveTo(tx(0),ty(top[0]));for(var i=1;i<d.nP;i++)ctx.lineTo(tx(i),ty(top[i]));ctx.strokeStyle=col;ctx.lineWidth=1.5;ctx.lineJoin='round';ctx.stroke()}}else{var cx2=W/2,cy2=plotT+plotH/2,r2=Math.min(W/2-12,plotH/2-4)*0.9,vals=d.series.map(function(s){return s.reduce(function(a,b){return a+b},0)}),total=vals.reduce(function(a,b){return a+b},0)||1,angle=-Math.PI/2;for(var s=0;s<d.nS;s++){var sweep=(vals[s]/total)*Math.PI*2;if(sweep<0.001){angle+=sweep;continue}ctx.beginPath();ctx.moveTo(cx2,cy2);ctx.arc(cx2,cy2,r2,angle,angle+sweep);ctx.closePath();ctx.fillStyle=CHART_COLORS[s]||'#999';ctx.fill();ctx.strokeStyle=isDarkMode?'#1C1C1E':'#F5F5F5';ctx.lineWidth=1.5;ctx.stroke();angle+=sweep}return}ctx.fillStyle=C_MUTED;ctx.font='7px '+FONT;ctx.textAlign='center';ctx.textBaseline='top';var colW2=plotW/d.nP;for(var i=0;i<d.nP;i++){var cx3=plotL+i*colW2+colW2/2,cat=d.categoryNames[i],maxCW=colW2-2;while(cat.length>1&&ctx.measureText(cat).width>maxCW)cat=cat.slice(0,-1);if(cat!==d.categoryNames[i])cat=cat.slice(0,-1)+'…';ctx.fillText(cat,cx3,plotB+3)}if(showXAxisTitle){ctx.fillStyle=C_MUTED;ctx.font='8px '+FONT;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(xAxisTitle,plotL+plotW/2,H-VPAD-xTH/2)}}
    var previewRaf=0;
    function schedulePreview(){if(previewRaf)cancelAnimationFrame(previewRaf);previewRaf=requestAnimationFrame(drawPreview)}
    if(typeof ResizeObserver!=='undefined'){new ResizeObserver(schedulePreview).observe(document.querySelector('.col-preview'))}
    var resizing=false,rsX=0,rsY=0,rsW=0,rsH=0,handle=document.getElementById('resize-handle');
    handle.addEventListener('mousedown',function(e){resizing=true;rsX=e.clientX;rsY=e.clientY;rsW=window.innerWidth;rsH=window.innerHeight;handle.classList.add('dragging');e.preventDefault()})
