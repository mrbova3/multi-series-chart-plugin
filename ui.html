<script>

function parseCsv(text){var lines=text.split(/\r?\n/).map(function(l){return l.trim()}).filter(function(l){return l.length>0});if(!lines.length)return null;var rows=lines.map(function(l){return l.split(',').map(function(c){return c.trim().replace(/^"|"$/g,'')})});var hasHeader=rows[0].some(function(c){return isNaN(Number(c))||c===''});var headers=null,dataRows=rows;if(hasHeader){headers=rows[0];dataRows=rows.slice(1)}if(!dataRows.length)return null;var firstLabel=isNaN(Number(dataRows[0][0]))||dataRows[0][0]==='';var off=firstLabel?1:0,nC=Math.max.apply(null,dataRows.map(function(r){return r.length}))-off;if(nC<=0)return null;var series=[];for(var c=0;c<nC;c++){var col=[];for(var r=0;r<dataRows.length;r++){var v=parseFloat(dataRows[r][c+off]);col.push(isFinite(v)?v:0)}series.push(col)}var names=null;if(headers){names=[];for(var c2=off;c2<headers.length;c2++)names.push(headers[c2]||'S'+(c2-off+1))}var cats=firstLabel?dataRows.map(function(r){return r[0]||''}):null;return{series:series,names:names,categoryNames:cats}}

var CC=['#EA580C','#0D9488','#164E63','#FBBF24','#38BDF8','#A78BFA']

function pvHorizontal(ctx,pL,pR,pT,pB,plotW,plotH,d,maxV,stacked,showGrid,sYT,yTitle,sXT,xTitle,F,sc,pad,cFG,cMUT,cGRID){

    }

  if(sXT){ctx.fillStyle=cMUT;ctx.font='7px '+F;ctx.textAlign='center';ctx.textBaseline='top';ctx.fillText(xTitle||'',bL+bW/2,pB+14)}
}
function pvVertical(ctx,pL,pR,pT,pB,plotW,plotH,d,maxV,stacked,showGrid,sYT,yTitle,sXT,xTitle,F,sc,pad,cFG,cMUT,cGRID){
  var YLW=24,bL=pL+YLW,bW=plotW-YLW
  ctx.fillStyle=cMUT;ctx.font='7px '+F;ctx.textAlign='right';ctx.textBaseline='middle'
  for(var g=0;g<=4;g+=2){var val=(g/4)*maxV,gy=pT+plotH-(g/4)*plotH;ctx.fillText(val>=10000?(val/1000).toFixed(0)+'k':val>=1000?(val/1000).toFixed(1).replace(/\.0$/,'')+'k':val.toFixed(0),bL-3,gy)}
  if(showGrid){ctx.strokeStyle=cGRID;ctx.lineWidth=0.5;for(var g=0;g<=4;g++){var gy=pT+plotH-(g/4)*plotH;ctx.beginPath();ctx.moveTo(bL,gy);ctx.lineTo(pR,gy);ctx.stroke()}}
  if(sYT){ctx.save();ctx.translate(pL+YLW/2,(pT+pB)/2);ctx.rotate(-Math.PI/2);ctx.fillStyle=cMUT;ctx.font='7px '+F;ctx.textAlign='center';ctx.textBaseline='middle';var yt=yTitle;while(yt.length>2&&ctx.measureText(yt).width>plotH*0.8)yt=yt.slice(0,-1);ctx.fillText(yt,0,0);ctx.restore()}
  var cW=bW/d.nP,gap=Math.max(1,cW*.1)
  if(stacked){for(var i=0;i<d.nP;i++){var base=0,bx=bL+i*cW+gap,bww=cW-gap*2;for(var s=d.nS-1;s>=0;s--){var bh=Math.max(0,(d.series[s][i]/maxV)*plotH);rrect(ctx,bx,pT+plotH-base-bh,bww,bh,s===d.nS-1?2:0);ctx.fillStyle=CC[s]||'#999';ctx.fill();base+=bh}}}
  else{var sw=Math.max(1,(cW-gap*2)/d.nS);for(var i=0;i<d.nP;i++)for(var s=0;s<d.nS;s++){var bh=Math.max(0,(d.series[s][i]/maxV)*plotH),bx=bL+i*cW+gap+s*sw;rrect(ctx,bx,pT+plotH-bh,Math.max(1,sw-1),bh,2);ctx.fillStyle=CC[s]||'#999';ctx.fill()}}
  ctx.fillStyle=cMUT;ctx.font='7px '+F;ctx.textAlign='center';ctx.textBaseline='top'
  for(var i=0;i<d.nP;i++){var cx2=bL+i*cW+cW/2,cat=d.categoryNames[i];while(cat.length>1&&ctx.measureText(cat).width>cW-2)cat=cat.slice(0,-1);if(cat!==d.categoryNames[i])cat=cat.slice(0,-1)+'…';ctx.fillText(cat,cx2,pB+2)}
  if(sXT){ctx.fillStyle=cMUT;ctx.font='7px '+F;ctx.textAlign='center';ctx.fillText(xTitle||'',bL+bW/2,pB+12)}
}
function pvArea(ctx,pL,pR,pT,pB,plotW,plotH,d,maxV,stacked,showGrid,F,sc,cMUT,cGRID){
  function tx(i){return pL+(i/Math.max(1,d.nP-1))*plotW}function ty(v){return pT+plotH-(v/maxV)*plotH}
  if(showGrid){ctx.strokeStyle=cGRID;ctx.lineWidth=0.5;for(var g=0;g<=4;g++){var gy=pT+plotH-(g/4)*plotH;ctx.beginPath();ctx.moveTo(pL,gy);ctx.lineTo(pR,gy);ctx.stroke()}}
  var ss=[];if(stacked){var run=Array(d.nP).fill(0);for(var s=0;s<d.nS;s++){var row=[];for(var i=0;i<d.nP;i++){run[i]+=d.series[s][i];row.push(run[i])}ss.push(row)}}
  for(var s=d.nS-1;s>=0;s--){var top=stacked?ss[s]:d.series[s],bot=stacked&&s>0?ss[s-1]:null,col=CC[s]||'#999';ctx.beginPath();ctx.moveTo(tx(0),ty(top[0]));for(var i=1;i<d.nP;i++)ctx.lineTo(tx(i),ty(top[i]));if(bot){for(var i=d.nP-1;i>=0;i--)ctx.lineTo(tx(i),ty(bot[i]))}else{ctx.lineTo(tx(d.nP-1),pB);ctx.lineTo(pL,pB)}ctx.closePath();ctx.fillStyle=col+'40';ctx.fill();ctx.beginPath();ctx.moveTo(tx(0),ty(top[0]));for(var i=1;i<d.nP;i++)ctx.lineTo(tx(i),ty(top[i]));ctx.strokeStyle=col;ctx.lineWidth=1.5;ctx.lineJoin='round';ctx.stroke()}
  ctx.fillStyle=cMUT;ctx.font='7px '+F;ctx.textAlign='center';ctx.textBaseline='top';for(var i=0;i<d.nP;i++)ctx.fillText(d.categoryNames[i],tx(i),pB+2)
}
function pvPie(ctx,cx,cy,r,d){var vals=d.series.map(function(s){return s.reduce(function(a,b){return a+b},0)}),total=vals.reduce(function(a,b){return a+b},0)||1,ang=-Math.PI/2;for(var s=0;s<d.nS;s++){var sw=(vals[s]/total)*Math.PI*2;if(sw<.001){ang+=sw;continue}ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,ang,ang+sw);ctx.closePath();ctx.fillStyle=CC[s]||'#999';ctx.fill();ang+=sw}}
function drawPreview(){
  var cv=document.getElementById('preview-canvas');if(!cv)return;var dpr=window.devicePixelRatio||1,W=Math.round(cv.getBoundingClientRect().width)||200,H=Math.round(cv.getBoundingClientRect().height)||300;cv.width=W*dpr;cv.height=H*dpr;var ctx=cv.getContext('2d');if(!ctx)return;ctx.scale(dpr,dpr)
  var DK=isDarkMode,C_SLIDE=DK?'#0D0D0D':'#e8e8e8',C_CARD=DK?'#141414':'#F5F5F5',C_CARD_BORDER=DK?'rgba(255,255,255,0.12)':'#E5E5E5',C_FG=DK?'#FAFAFA':'#0A0A0A',C_MUTED=DK?'#A3A3A3':'#737373',C_GRID=DK?'rgba(255,255,255,0.08)':'#E5E5E5',F='Inter,-apple-system,sans-serif'
  var chartType=document.getElementById('chartType').value||'bar',stacked=stateStacked,horizontal=chartType==='bar'&&stateHorizontal,showGrid=stateGrid,showLegend=stateLegend
  var showChartTitle=Boolean(document.getElementById('showChartTitle').checked),chartTitle=(document.getElementById('chartTitle').value||'Chart title').trim()
  var showXAxisTitle=Boolean(document.getElementById('showXAxisTitle').checked),xAxisTitle=(document.getElementById('xAxisTitle').value||'X axis').trim()
  var showYAxisTitle=Boolean(document.getElementById('showYAxisTitle').checked),yAxisTitle=(document.getElementById('yAxisTitle').value||'Y-Axis').trim()
  var d=getPreviewData();ctx.fillStyle=C_SLIDE;ctx.fillRect(0,0,W,H)
  var CM=8,CL=CM,CT=CM,CW=W-CM*2,CH=H-CM*2;ctx.fillStyle=C_CARD;rrect(ctx,CL,CT,CW,CH,12);ctx.fill();ctx.strokeStyle=C_CARD_BORDER;ctx.lineWidth=1;rrect(ctx,CL+.5,CT+.5,CW-1,CH-1,12);ctx.stroke()
  var sc=Math.min(CW/600,CH/500),pad=Math.max(8,Math.round(SDS_PAD*sc)),hdrH=0
  if(showChartTitle||showLegend){
    var TITLE_FS=Math.max(9,Math.round(18*sc)),SWATCH=Math.max(5,Math.round(12*sc)),hdrTop=CT+pad
    if(showChartTitle){ctx.fillStyle=C_FG;ctx.font='600 '+TITLE_FS+'px '+F;ctx.textAlign='left';ctx.textBaseline='top';var tt=chartTitle;while(tt.length>3&&ctx.measureText(tt).width>CW*.45)tt=tt.slice(0,-1);if(tt!==chartTitle)tt=tt.slice(0,-1)+'…';ctx.fillText(tt,CL+pad,hdrTop)}
    if(showLegend&&chartType!=='pie'){ctx.font='8px '+F;ctx.textBaseline='middle';var lx=CL+CW-pad;for(var s=d.nS-1;s>=0;s--){var lbl=d.seriesNames[s];while(lbl.length>2&&lx-ctx.measureText(lbl).width-SWATCH-9<CL+pad)lbl=lbl.slice(0,-1);if(lbl.length<d.seriesNames[s].length)lbl=lbl.slice(0,-1)+'…';var lw=ctx.measureText(lbl).width;lx-=lw;ctx.fillStyle=C_FG;ctx.fillText(lbl,lx,hdrTop+SWATCH/2);lx-=SWATCH+3;rrect(ctx,lx,hdrTop,SWATCH,SWATCH,2);ctx.fillStyle=CC[s]||'#999';ctx.fill();lx-=6;if(lx<CL+pad+40)break}}
    hdrH=pad+Math.max((showChartTitle?TITLE_FS:0),(showLegend&&chartType!=='pie'?SWATCH:0))+pad
  }
  var plotT=CT+hdrH,plotB=CT+CH-pad,plotL=CL+pad,plotR=CL+CW-pad,plotW=plotR-plotL,plotH=plotB-plotT
  if(plotH<10||plotW<10)return
  var gMax=0;for(var i=0;i<d.nP;i++){if(stacked){var sm=0;for(var s=0;s<d.nS;s++)sm+=d.series[s][i];gMax=Math.max(gMax,sm)}else for(var s=0;s<d.nS;s++)gMax=Math.max(gMax,d.series[s][i])}
  var maxV=niceMax(gMax)
  if(chartType==='bar'&&horizontal)pvHorizontal(ctx,plotL,plotR,plotT,plotB,plotW,plotH,d,maxV,stacked,showGrid,showYAxisTitle,yAxisTitle,showXAxisTitle,xAxisTitle,F,sc,pad,C_FG,C_MUTED,C_GRID)
  else if(chartType==='bar')pvVertical(ctx,plotL,plotR,plotT,plotB,plotW,plotH,d,maxV,stacked,showGrid,showYAxisTitle,yAxisTitle,showXAxisTitle,xAxisTitle,F,sc,pad,C_FG,C_MUTED,C_GRID)
  else if(chartType==='area')pvArea(ctx,plotL,plotR,plotT,plotB,plotW,plotH,d,maxV,stacked,showGrid,F,sc,C_MUTED,C_GRID)
  else pvPie(ctx,CL+CW/2,CT+CH/2,Math.min(CW,CH)/2-pad*1.2,d)
}
function schedulePreview(){if(previewRaf)cancelAnimationFrame(previewRaf);previewRaf=requestAnimationFrame(function(){try{drawPreview()}catch(e){setTimeout(function(){try{drawPreview()}catch(e2){}},50)}})}
function tryDraw(attempt){var cv=document.getElementById('preview-canvas');if(!cv){if((attempt||0)<10)setTimeout(function(){tryDraw((attempt||0)+1)},80);return}var rect=cv.getBoundingClientRect(),testCtx=cv.getContext('2d');if((rect.width===0||rect.height===0||!testCtx)&&(attempt||0)<10){setTimeout(function(){tryDraw((attempt||0)+1)},100);return}drawPreview()}
if(typeof ResizeObserver!=='undefined'){new ResizeObserver(schedulePreview).observe(document.querySelector('.col-preview'))}
setTimeout(tryDraw,50);setTimeout(tryDraw,250)
var resizing=false,rsX=0,rsY=0,rsW=0,rsH=0
document.getElementById('resize-handle').addEventListener('mousedown',function(e){resizing=true;rsX=e.clientX;rsY=e.clientY;rsW=window.innerWidth;rsH=window.innerHeight;e.preventDefault()})
document.addEventListener('mousemove',function(e){if(!resizing)return;var nW=Math.max(380,Math.min(1400,rsW+(e.clientX-rsX))),nH=Math.max(260,Math.min(1000,rsH+(e.clientY-rsY)));parent.postMessage({pluginMessage:{type:'window-resize',width:nW,height:nH}},'*')})
document.addEventListener('mouseup',function(){resizing=false})
parent.postMessage({pluginMessage:{type:'ready'}},'*')
</script>
