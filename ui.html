eries[s][i]/mV)*pH),bx=pL+i*cW+gap+s*sw;rr(ctx,bx,pT+pH-bh,Math.max(1,sw-1),bh,2);ctx.fillStyle=CC[s]||'#999';ctx.fill()}}}ctx.fillStyle=CM;ctx.font='7px '+F;ctx.textAlign='center';ctx.textBaseline='top';for(var i=0;i<d.nP;i++){var cx2=pL+i*cW+cW/2,cat=d.cN[i];while(cat.length>1&&ctx.measureText(cat).width>cW-2)cat=cat.slice(0,-1);if(cat!==d.cN[i])cat=cat.slice(0,-1)+'…';ctx.fillText(cat,cx2,pB+2)}}else if(cT==='area'){var ss=[];if(stk){var run=Array(d.nP).fill(0);for(var s=0;s<d.nS;s++){var row=[];for(var i=0;i<d.nP;i++){run[i]+=d.series[s][i];row.push(run[i])}ss.push(row)}}function tx(i){return pL+(i/Math.max(1,d.nP-1))*pW}function ty(v){return pT+pH-(v/mV)*pH}for(var s=d.nS-1;s>=0;s--){var top=stk?ss[s]:d.series[s],bot=stk&&s>0?ss[s-1]:null,col=CC[s]||'#999';ctx.beginPath();ctx.moveTo(tx(0),ty(top[0]));for(var i=1;i<d.nP;i++)ctx.lineTo(tx(i),ty(top[i]));if(bot){for(var i=d.nP-1;i>=0;i--)ctx.lineTo(tx(i),ty(bot[i]))}else{ctx.lineTo(tx(d.nP-1),pT+pH);ctx.lineTo(pL,pT+pH)}ctx.closePath();ctx.fillStyle=col+'40';ctx.fill();ctx.beginPath();ctx.moveTo(tx(0),ty(top[0]));for(var i=1;i<d.nP;i++)ctx.lineTo(tx(i),ty(top[i]));ctx.strokeStyle=col;ctx.lineWidth=1.5;ctx.lineJoin='round';ctx.stroke()}ctx.fillStyle=CM;ctx.font='7px '+F;ctx.textAlign='center';ctx.textBaseline='top';for(var i=0;i<d.nP;i++)ctx.fillText(d.cN[i],tx(i),pB+2)}else{var cx2=W/2,cy2=pT+pH/2,r2=Math.min(W/2-10,pH/2-4)*.9,vals=d.series.map(function(s){return s.reduce(function(a,b){return a+b},0)}),total=vals.reduce(function(a,b){return a+b},0)||1,ang=-Math.PI/2;for(var s=0;s<d.nS;s++){var sw2=(vals[s]/total)*Math.PI*2;if(sw2<.001){ang+=sw2;continue}ctx.beginPath();ctx.moveTo(cx2,cy2);ctx.arc(cx2,cy2,r2,ang,ang+sw2);ctx.closePath();ctx.fillStyle=CC[s]||'#999';ctx.fill();ctx.strokeStyle=isDarkMode?'#1C1C1E':'#F5F5F5';ctx.lineWidth=1.5;ctx.stroke();ang+=sw2}return}if(sXT){ctx.fillStyle=CM;ctx.font='7px '+F;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(xtxt,pL+pW/2,H-VP-xTH/2)}}
